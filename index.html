<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>간단 수식 공유기</title>

  <!-- MathJax -->
  <script>
    window.MathJax = {
      loader: {
        load: ['input/asciimath', 'output/svg']
      },
      svg: {
        fontCache: 'global'
      }
    };
  </script>

  <script async
    src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-svg.js">
  </script>

  <!-- 이미지 저장 -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <style>
    body {
      font-family: sans-serif;
      margin: 20px;
      background: #fafafa;
    }

    textarea {
      width: 100%;
      font-size: 16px;
      padding: 12px;
      box-sizing: border-box;
      border-radius: 12px;
      border: 1px solid #ccc;
      resize: vertical;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      margin-bottom: 20px;
    }

    button {
      border: none;
      padding: 10px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      background: #4f46e5;
      color: white;
    }

    button:hover {
      opacity: 0.9;
    }

    #captureArea {
      display: inline-block;
      background: white;
      padding: 24px;
      border-radius: 18px;
      border: 1px solid #ddd;
      max-width: 100%;
      overflow-x: auto;
    }

    #output {
      display: inline-block;
      min-height: 50px;
      font-size: 36px;
      line-height: 1.5;
    }

    #output svg {
      overflow: visible;
    }

    .hint-box {
      margin-top: 40px;
      background: #f4f4f4;
      padding: 15px;
      border-left: 4px solid #999;
      border-radius: 10px;
      font-size: 14px;
    }

    .hint-box table {
      width: 100%;
      border-collapse: collapse;
    }

    .hint-box th,
    .hint-box td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: left;
    }

    .hint-box th {
      background: #eaeaea;
    }
  </style>
</head>

<body>

  <h2>간단 수식 입력기 (AsciiMath)</h2>

  <textarea
    id="input"
    rows="3"
    oninput="render()"
  >a/b + sqrt(4)</textarea>

  <div class="toolbar">
    <button onclick="copyURL()">🔗 URL 복사</button>
    <button onclick="saveImage()">🖼️ 이미지 저장</button>
  </div>

  <h3>수식 결과:</h3>

  <div id="captureArea">
    <div id="output"></div>
  </div>

  <div class="hint-box">
    <h4>📘 자주 쓰는 수식 문법</h4>

    <table>
      <thead>
        <tr>
          <th>의미</th>
          <th>입력</th>
          <th>예시</th>
        </tr>
      </thead>

      <tbody>
        <tr>
          <td>분수</td>
          <td>a/b</td>
          <td>`a/b`</td>
        </tr>

        <tr>
          <td>제곱</td>
          <td>x^2</td>
          <td>`x^2`</td>
        </tr>

        <tr>
          <td>루트</td>
          <td>sqrt(4)</td>
          <td>`sqrt(4)`</td>
        </tr>

        <tr>
          <td>n제곱근</td>
          <td>root(3)(8)</td>
          <td>`root(3)(8)`</td>
        </tr>

        <tr>
          <td>괄호</td>
          <td>(a+b)/(c+d)</td>
          <td>`(a+b)/(c+d)`</td>
        </tr>

        <tr>
          <td>π, ∞</td>
          <td>pi, oo</td>
          <td>`pi, oo`</td>
        </tr>

        <tr>
          <td>→, ⇔</td>
          <td>->, <=> </td>
          <td>`->, <=>`</td>
        </tr>
      </tbody>
    </table>
  </div>

  <script>
    async function render() {
      const input = document.getElementById("input").value;
      const output = document.getElementById("output");

      // AsciiMath
      output.innerHTML = "`" + input + "`";

      // 기존 MathJax 제거
      if (MathJax.typesetClear) {
        MathJax.typesetClear([output]);
      }

      // 렌더
      await MathJax.typesetPromise([output]);
    }

    function copyURL() {
      const val = document.getElementById("input").value;

      const url =
        `${location.origin}${location.pathname}?q=${encodeURIComponent(val)}`;

      navigator.clipboard.writeText(url);

      alert("URL 복사됨!");
    }

    async function saveImage() {
      const target = document.getElementById("captureArea");

      // 렌더 안정화
      await new Promise(resolve => setTimeout(resolve, 150));

      const canvas = await html2canvas(target, {
        backgroundColor: "#ffffff",
        scale: 3,
        useCORS: true
      });

      const link = document.createElement("a");

      link.download = "formula.png";
      link.href = canvas.toDataURL("image/png");

      link.click();
    }

    window.onload = async () => {
      const params = new URLSearchParams(location.search);

      const q = params.get("q");

      if (q) {
        document.getElementById("input").value =
          decodeURIComponent(q);
      }

      await render();
    };
  </script>

</body>
</html>
