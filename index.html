<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>간단 수식 공유기</title>
  <script>
    window.MathJax = {
      loader: { load: ['input/asciimath', 'output/chtml'] }
    };
  </script>
  <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <style>
    body {
      font-family: sans-serif;
      margin: 20px;
    }

    textarea, .editable {
      width: 100%;
      font-size: 16px;
      padding: 8px;
      box-sizing: border-box;
    }

    .editable {
      min-height: 40px;
      padding: 10px;
    }

    #output:focus {
      outline: none;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .hint-box {
      margin-top: 40px;
      background: #f4f4f4;
      padding: 15px;
      border-left: 4px solid #aaa;
      font-size: 14px;
    }

    .hint-box table {
      width: 100%;
      border-collapse: collapse;
    }

    .hint-box th, .hint-box td {
      border: 1px solid #ccc;
      padding: 6px;
      text-align: left;
    }

    .hint-box th {
      background-color: #eee;
    }
  </style>
</head>
<body>
  <h2>간단 수식 입력기 (AsciiMath)</h2>
  <textarea id="input" rows="3" onchange="render()">a/b + sqrt(4)</textarea>
  <div class="toolbar">
    <div>
      <button onclick="copyURL()">🔗 URL 복사</button>
    </div>
  </div>

  <h3>수식 결과:</h3>
  <div id="output" class="editable">`a/b + sqrt(4)`</div>

  <div class="hint-box">
    <h4>📘 자주 쓰는 수식 문법</h4>
    <table>
      <thead>
        <tr><th>의미</th><th>입력</th><th>예시</th></tr>
      </thead>
      <tbody>
        <tr><td>분수</td><td>a/b</td><td>`a/b`</td></tr>
        <tr><td>제곱</td><td>x^2</td><td>`x^2`</td></tr>
        <tr><td>루트</td><td>sqrt(4)</td><td>`sqrt(4)`</td></tr>
        <tr><td>n제곱근</td><td>root(3)(8)</td><td>`root(3)(8)`</td></tr>
        <tr><td>괄호</td><td>(a+b)/(c+d)</td><td>`(a+b)/(c+d)`</td></tr>
        <tr><td>π, ∞</td><td>pi, oo</td><td>`pi, oo`</td></tr>
        <tr><td>→, ⇔</td><td>->, <=></td><td>`->, <=>`</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    function render() {
      const val = document.getElementById("input").value;
      const output = document.getElementById("output");
      output.textContent = "`" + val + "`";
      MathJax.typesetPromise();
    }

    function copyURL() {
      const val = document.getElementById("input").value;
      const url = `${location.origin}${location.pathname}?q=${encodeURIComponent(val)}`;
      navigator.clipboard.writeText(url);
      alert("URL 복사됨!");
    }

    window.onload = () => {
      const params = new URLSearchParams(location.search);
      if (params.get("q")) {
        const decoded = decodeURIComponent(params.get("q"));
        document.getElementById("input").value = decoded;
        document.getElementById("output").textContent = "`" + decoded + "`";
        MathJax.typesetPromise();
      }
    };
  </script>
</body>
</html>
